name: "Roblox Obby Quest"
style: calm
multi_worksheet: true
fonts:
  primary: "Lexend"
  heading: "Fredoka"
colors:
  directions: "#2563EB"
  examples: "#059669"
  key_words: "#D97706"
  rewards: "#D97706"
  background: "#FAFAFA"
  text: "#1F2937"
  chunk_border: "#E5E7EB"
avatar_position: "integrated"
decorative_elements:
  max_per_page: 2
  assets: []
character_spec:
  art_style: "roblox_2d_comic_avatar"
  style_description: >
    Roblox-inspired 2D comic/game-instruction-card character with bold black
    outlines, saturated colors, simple readable shapes, and light cel shading.
    The character should preserve Ian's learning buddy likeness from the profile
    style sheet: rainbow spiky hair, square peach head, blue shirt with yellow
    lightning bolt, brown pants, and orange sneakers. Think a printable Roblox
    learning comic panel, not a generic 3D plastic toy render.
  body_description: >
    Blocky Roblox-like proportions: large square head with softly rounded
    corners, compact rectangular torso, rectangular arms and hands, straight
    blocky legs, and broad simple shoes. For Ian, clothing must stay consistent:
    bright blue short-sleeve shirt with a large yellow lightning bolt, brown
    pants, orange sneakers with white soles and white lace accents, and optional
    brown backpack only when scene-appropriate.
  face_description: >
    Friendly simple Roblox-style face: square peach face, two black oval eyes,
    no detailed nose, and a simple curved smile. Some happy scenes may use an
    open cheerful smile, but the face must remain simple and decal-like.
  scene_environment: >
    Calm printable Roblox/obby learning environment with light blue walls or sky,
    simple geometric platforms, classroom/home-practice props, and plenty of
    white space around literacy content. Backgrounds should support focus rather
    than compete with worksheet text.
  scene_elements:
    - "floating neon block platforms"
    - "spinning yellow coins"
    - "rainbow-striped path segments"
    - "glowing checkpoint pillars"
    - "jump pad with upward arrow"
    - "lava pit with orange glow"
    - "star collectibles"
  color_palette: >
    Bright saturated avatar colors: peach skin, vivid rainbow hair (red, orange,
    yellow, green, cyan, blue, purple, magenta), blue shirt, yellow lightning
    bolt, brown pants, and orange shoes. Use calmer light blue, soft gray,
    white, and pale platform colors in backgrounds for print readability.
  reference_keywords:
    - "Roblox inspired comic avatar"
    - "blocky learning buddy"
    - "rainbow spiky hair"
    - "blue lightning shirt"
    - "orange sneakers"
  judge_criteria:
    - "Ian's rainbow spiky hair is preserved with multiple vivid color sections"
    - "Character wears the blue shirt with a large yellow lightning bolt"
    - "Character wears brown pants and orange sneakers with white soles"
    - "Face is square, peach, simple, and friendly with black oval eyes"
    - "Body remains blocky and Roblox-inspired, not realistic or anime"
    - "Background is calm and print-readable with limited decorative clutter"
    - "No generated scene changes the core avatar identity or clothing"
