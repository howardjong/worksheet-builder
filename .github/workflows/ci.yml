name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: pip install -r requirements.txt
      - run: make lint
      - run: make typecheck
      - run: make test
